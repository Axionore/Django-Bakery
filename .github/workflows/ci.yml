name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --release
      - name: Test
        run: cargo test --workspace

  smoke-render:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p django-bakery
      - name: Render minimal recipe
        run: ./target/release/django-bakery new --yes --offline --output /tmp/out --force
      - name: Sanity-check generated project
        run: |
          ls -la /tmp/out/my_awesome_app
          test -f /tmp/out/my_awesome_app/manage.py
          test -f /tmp/out/my_awesome_app/pyproject.toml
          test -f /tmp/out/my_awesome_app/config/settings/base.py
          test -f /tmp/out/my_awesome_app/apps/users/models.py
