name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  # Required by actions/attest-build-provenance to generate Sigstore attestations.
  id-token: write
  attestations: write

jobs:
  release-binaries:
    name: Build binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross (Linux)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --locked
      - name: Build
        shell: bash
        run: |
          if [[ "$TARGET" == *"linux"* ]]; then
            cross build --release --target "$TARGET" -p django-bakery
          else
            cargo build --release --target "$TARGET" -p django-bakery
          fi
      - name: Package
        shell: bash
        run: |
          name="django-bakery-${REF_NAME}-${TARGET}"
          mkdir -p dist
          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/${TARGET}/release/django-bakery.exe" "dist/${name}.exe"
            (cd dist && 7z a "${name}.zip" "${name}.exe")
          else
            cp "target/${TARGET}/release/django-bakery" "dist/${name}"
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          fi
      - name: Generate build-provenance attestation (SLSA)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.target }}
          path: dist/

  release:
    needs: release-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Compute checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true
          ls -la
      - name: Create GH Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          generate_release_notes: true

  ghcr:
    needs: release-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # OCI / Docker registry spec rejects uppercase characters in repository
      # names. `${{ github.repository }}` preserves the literal case
      # (`Axionore/Django-Bakery`), so we lowercase it once here and reuse the
      # result for tagging + attestation. Using ${VAR,,} (bash 4 lowercase
      # parameter expansion) keeps the substitution local to one step.
      - name: Compute lowercase image name
        id: img
        run: |
          repo='${{ github.repository }}'
          echo "name=ghcr.io/${repo,,}" >> "$GITHUB_OUTPUT"
      - id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: installer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
      - name: Attest GHCR image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  crates-io:
    # Publish the three workspace crates to crates.io in dependency order:
    # templates → engine → cli. Each `cargo publish --wait-for-publish` blocks
    # until the index registers the new version, so the next crate can resolve.
    # Requires the `CRATES_IO_TOKEN` repo secret (Trusted Publishing-eligible
    # account scope on crates.io).
    needs: release-binaries
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - name: Publish django-bakery-templates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p django-bakery-templates --locked
      - name: Publish django-bakery-engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p django-bakery-engine --locked
      - name: Publish django-bakery (cli)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p django-bakery --locked

  homebrew:
    # Update the homebrew-tap repo's `Formula/django-bakery.rb` with the
    # SHA-256 sums of the macOS + Linux release tarballs. Requires a
    # `HOMEBREW_TAP_TOKEN` repo secret with `contents: write` on the tap
    # (a PAT or GitHub App installation token).
    needs: release-binaries
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') }}
    env:
      TAP_REPO: Axionore/homebrew-tap
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate Homebrew formula
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME#v}
          REPO="${{ github.repository }}"
          REL_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"
          cd dist
          SHA_LINUX_X64=$(sha256sum  "django-bakery-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.tar.gz"  | awk '{print $1}')
          SHA_LINUX_ARM=$(sha256sum  "django-bakery-${GITHUB_REF_NAME}-aarch64-unknown-linux-musl.tar.gz" | awk '{print $1}')
          SHA_MAC_X64=$(sha256sum    "django-bakery-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz"        | awk '{print $1}')
          SHA_MAC_ARM=$(sha256sum    "django-bakery-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"      | awk '{print $1}')
          cd ..
          cat > django-bakery.rb <<RB
          class DjangoBakery < Formula
            desc "Rust-powered Django 6 project generator"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${REL_URL}/django-bakery-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MAC_ARM}"
              else
                url "${REL_URL}/django-bakery-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MAC_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${REL_URL}/django-bakery-${GITHUB_REF_NAME}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              else
                url "${REL_URL}/django-bakery-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              # Hardware::CPU.arch returns :arm64 on Apple Silicon, but our
              # tarballs use the Rust-target triple convention (aarch64).
              # Build the correct triple explicitly instead of interpolating.
              triple =
                if OS.mac?
                  Hardware::CPU.arm? ? "aarch64-apple-darwin" : "x86_64-apple-darwin"
                else
                  Hardware::CPU.arm? ? "aarch64-unknown-linux-musl" : "x86_64-unknown-linux-musl"
                end
              bin.install "django-bakery-${GITHUB_REF_NAME}-#{triple}" => "django-bakery"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/django-bakery --version")
            end
          end
          RB
          echo '---'
          cat django-bakery.rb
      - name: Push formula to tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          mv django-bakery.rb tap/Formula/django-bakery.rb
          cd tap
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Formula/django-bakery.rb
          git commit -m "django-bakery ${GITHUB_REF_NAME}" || { echo 'no changes'; exit 0; }
          git push
