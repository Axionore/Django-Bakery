name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  # Required by actions/attest-build-provenance to generate Sigstore attestations.
  id-token: write
  attestations: write

jobs:
  release-binaries:
    name: Build binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross (Linux)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --locked
      - name: Build
        shell: bash
        run: |
          if [[ "$TARGET" == *"linux"* ]]; then
            cross build --release --target "$TARGET" -p django-bakery
          else
            cargo build --release --target "$TARGET" -p django-bakery
          fi
      - name: Package
        shell: bash
        run: |
          name="django-bakery-${REF_NAME}-${TARGET}"
          mkdir -p dist
          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/${TARGET}/release/django-bakery.exe" "dist/${name}.exe"
            (cd dist && 7z a "${name}.zip" "${name}.exe")
          else
            cp "target/${TARGET}/release/django-bakery" "dist/${name}"
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          fi
      - name: Generate build-provenance attestation (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/

  release:
    needs: release-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true
          ls -la
      - name: Create GH Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          generate_release_notes: true

  ghcr:
    needs: release-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: installer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      - name: Attest GHCR image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true
