# Server-rendered HTMX + Alpine + Tailwind. No SPA, no Node.
project_name = "AddOns Demo"
project_slug = "addons_demo"
description = "Sentry + OTel + feature flags toggled on"
author_name = "e2e"
author_email = "e2e@example.com"
domain_name = "addons.example.com"
license = "mit"
open_source = true

python_version = "3.14"
django_version = "6.0"
mode = "development"
relational_db = "sqlite"
graph_db = "none"
api_layer = "ninja"
frontend = "htmx-alpine"
frontend_variant = "full"
js_language = "typescript"
js_testing = false
css_framework = "tailwind"

use_celery = false
celery_broker = "redis"
use_mailpit = false
prod_email = "console"
storage = "whitenoise"
use_sentry = true
use_observability = true
use_feature_flags = true
type_checker = "none"
use_pre_commit = false
ci = "none"
container_setup = "none"
version_control = "none"
timezone = "UTC"
